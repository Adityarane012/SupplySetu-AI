<!-- Micro-interactions & Logic Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const phoneInput = document.getElementById('phone');
            const btnSendOtp = document.getElementById('btn-send-otp');
            const stepOtp = document.getElementById('step-otp');
            const otpOverlay = document.getElementById('otp-overlay');
            const displayPhone = document.getElementById('display-phone');
            const otpInputs = document.querySelectorAll('.otp-input');
            const btnVerify = document.getElementById('btn-verify');

            // Format phone number loosely for Indian context
            phoneInput.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, '');
                if (val.length > 10) val = val.slice(0, 10);
                e.target.value = val;
            });

            // Simulate Send OTP action
            btnSendOtp.addEventListener('click', () => {
                const num = phoneInput.value;
                if (num.length >= 10) {
                    // Visual transition to OTP state
                    btnSendOtp.innerHTML = `<span class="material-symbols-outlined animate-spin" style="font-size: 18px;">progress_activity</span><span>Sending...</span>`;
                    
                    setTimeout(() => {
                        displayPhone.textContent = '+91 ' + num;
                        
                        // Disable phone step visually
                        document.getElementById('step-phone').classList.add('opacity-50', 'pointer-events-none');
                        
                        // Enable OTP step
                        stepOtp.classList.remove('opacity-30', 'pointer-events-none');
                        stepOtp.classList.add('opacity-100');
                        otpOverlay.classList.add('hidden');
                        
                        // Focus first OTP input
                        otpInputs[0].focus();
                        
                        // Reset Send button for UI consistency in demo
                        btnSendOtp.innerHTML = `<span>Sent Successfully</span><span class="material-symbols-outlined" style="font-size: 18px;">check</span>`;
                        btnSendOtp.classList.replace('bg-primary-container', 'bg-secondary-container');
                        btnSendOtp.classList.replace('text-on-primary', 'text-on-secondary-container');
                    }, 800);
                } else {
                    // Simple shake error (inline animation class trick)
                    phoneInput.parentElement.classList.add('border-error', 'ring-1', 'ring-error');
                    setTimeout(() => phoneInput.parentElement.classList.remove('border-error', 'ring-1', 'ring-error'), 500);
                }
            });

            // OTP Auto-advance logic
            otpInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Restrict to single digit
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    
                    // Auto advance
                    if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                    
                    checkVerifyReady();
                });

                input.addEventListener('keydown', (e) => {
                    // Handle backspace navigation
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        otpInputs[index - 1].focus();
                    }
                });
            });

            function checkVerifyReady() {
                const allFilled = Array.from(otpInputs).every(input => input.value.length === 1);
                if (allFilled) {
                    btnVerify.removeAttribute('disabled');
                    // Add slight pulse to indicate readiness
                    btnVerify.classList.add('animate-[pulse_2s_ease-in-out_infinite]');
                } else {
                    btnVerify.setAttribute('disabled', 'true');
                    btnVerify.classList.remove('animate-[pulse_2s_ease-in-out_infinite]');
                }
            }
        });
    </script>
