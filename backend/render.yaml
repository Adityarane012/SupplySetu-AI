services:
  - type: web
    name: supplysetu-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434" # Note: Ollama might not run on Render free tier natively without Docker, update if using external Ollama
